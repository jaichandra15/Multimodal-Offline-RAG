version: "3.8"

services:
  # PostgreSQL with PGVector
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rag_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: offrag
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (NEW)
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag_backend
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/offrag
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: phi3:mini
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["python", "-m", "backend.main"]
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://8000-01kjftqgyazawrg2zrdhsgqpp2.cloudspaces.litng.ai
    ports:
      - "3000:3000"
    restart: unless-stopped

  # Document Ingestion (run manually)
  ingestion:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag_ingestion
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/offrag
      OLLAMA_BASE_URL: http://rag_ollama:11434
      OLLAMA_LLM_MODEL: phi3:mini
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
    volumes:
      - .:/app
    command: ["python", "-m", "backend.ingestion.pipeline", "--documents", "documents"]
    profiles:
      - ingestion

volumes:
  postgres_data:
  ollama_data: